<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Update · URSA Express</title>
<link rel="stylesheet" href="assets/css/shared.css">
<link rel="stylesheet" href="assets/css/location-update.css">
</head>
<body>

<div class="map-bg" aria-hidden="true"></div>
<div class="map-vignette" aria-hidden="true"></div>

<div class="wrap">
  <header class="topbar">
    <h1 class="page-title"><span class="title-text">Location Update</span></h1>
    <p class="page-subtitle">Convert a location into a team message</p>
    <div class="header-controls">
      <a href="index.html" class="hdr-btn back-btn">← Main</a>
      <button class="hdr-btn" id="langBtn">RU</button>
      <button class="hdr-btn" id="themeBtn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="input-card">
      <label class="field-label" for="locInput" data-i18n="inputLabel">ZIP, City/State, or Maps link</label>
      <div class="input-row">
        <textarea id="locInput" class="loc-input" rows="2"
          placeholder="ZIP, City/State, or Maps link"
          autocomplete="off" spellcheck="false"></textarea>
        <button class="btn-generate" id="generateBtn" data-i18n="generateBtn">Go</button>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-text" id="resultText">Hi, team! Current location: <span class="loc-placeholder">[Current Location]</span></div>
      <button class="btn-copy" id="copyBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span data-i18n="copyBtn">Copy</span>
      </button>
    </div>

    <div id="miniMap" hidden></div>
  </main>
</div>

<script src="assets/js/map.js"></script>
<script src="assets/js/location-update.js"></script>
</body>
</html>
