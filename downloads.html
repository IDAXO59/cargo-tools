<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads · URSA Express</title>
<style>
:root[data-theme="dark"] {
  --bg: #0a0a0b;
  --card: #131418;
  --card-elev: #1a1c22;
  --border: #2a2d35;
  --border-strong: #3a3d47;
  --text: #f1f5f9;
  --muted: #8a8f9a;
  --divider: #1f2128;
  --primary: #FFB318;
  --primary-dark: #e09e10;
  --primary-soft: rgba(255,179,24,0.12);
  --hover: #1f2128;
  --green: #22c55e;
  --green-soft: #14532d40;
}
:root[data-theme="light"] {
  --bg: #f8fafc;
  --card: #ffffff;
  --card-elev: #f1f5f9;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --muted: #64748b;
  --divider: #e2e8f0;
  --primary: #c87f00;
  --primary-dark: #a36800;
  --primary-soft: rgba(255,179,24,0.10);
  --hover: #f1f5f9;
  --green: #16a34a;
  --green-soft: rgba(22,163,74,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── Header ── */
.topbar {
  position: relative;
  text-align: center;
  margin-bottom: 48px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--divider);
  min-height: 48px;
}
.brand-logo-link {
  position: absolute;
  top: 0;
  left: 0;
  display: inline-flex;
  transition: opacity 0.15s;
  text-decoration: none;
}
.brand-logo-link:hover { opacity: 0.8; }
.brand-logo { height: 38px; width: auto; display: block; }
.controls { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
.nav-btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 12px; min-width: 36px;
  background: var(--card); background-image: linear-gradient(to right, #FFB318 50%, transparent 50%); background-size: 200% 100%; background-position: 100% 0; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  text-decoration: none; cursor: pointer; transition: background-position 0.18s cubic-bezier(.4,0,1,1), border-color 0.16s ease, color 0.16s ease;
  font-family: inherit;
}
.nav-btn:hover { background-position: 0% 0; border-color: #FFB318; color: #1a1205; }
#themeBtn svg { width: 18px; height: 18px; }
:root[data-theme="dark"] .icon-sun { display: block; }
:root[data-theme="dark"] .icon-moon { display: none; }
:root[data-theme="light"] .icon-sun { display: none; }
:root[data-theme="light"] .icon-moon { display: block; }
@media (max-width: 600px) {
  .topbar { padding-top: 60px; }
  .brand-logo-link { left: 50%; transform: translateX(-50%); }
  .controls { position: static; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
}
.page-title {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1.1;
  margin-top: 4px;
}
.page-subtitle {
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.95rem;
  letter-spacing: 0.01em;
}

/* ── Back link ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: var(--muted);
  text-decoration: none;
  margin-bottom: 32px;
  transition: color 0.15s;
}
.back-link:hover { color: var(--primary); }

/* ── Downloads list ── */
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.downloads-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 40px;
}
.download-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
}
.download-row:hover {
  border-color: var(--primary);
  box-shadow: 0 0 0 1px var(--primary), 0 4px 16px rgba(255,179,24,0.12);
  background: var(--card-elev);
}
.file-icon {
  font-size: 1.5rem;
  flex-shrink: 0;
  width: 40px;
  text-align: center;
}
.file-info {
  flex: 1;
  min-width: 0;
}
.file-name {
  font-size: 0.975rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-desc {
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 2px;
}
.file-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.file-size {
  font-size: 0.78rem;
  color: var(--muted);
}
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  background: var(--primary-soft);
  border: 1px solid var(--primary);
  border-radius: 7px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--primary);
  transition: background 0.15s;
  white-space: nowrap;
}
.download-row:hover .download-btn {
  background: var(--primary);
  color: #fff;
}
@media (max-width: 560px) {
  .file-size { display: none; }
  .download-btn { padding: 6px 10px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1 class="page-title">Downloads</h1>
    <p class="page-subtitle">Templates and documents for dispatchers</p>
    <div class="controls">
      <a href="index.html" class="nav-btn" style="font-weight:600;">← Main</a>
      <button class="nav-btn" id="langBtn" onclick="toggleLang()">RU</button>
      <button class="nav-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <p class="section-label">Available Files</p>
    <div class="downloads-list">

      <!-- Example file rows – replace href with actual file paths -->
      <a href="files/rate-confirmation-template.pdf" download class="download-row">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">Rate Confirmation Template</div>
          <div class="file-desc">Standard RC form for dispatchers</div>
        </div>
        <div class="file-meta">
          <span class="file-size">PDF</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

      <a href="files/bol-template.pdf" download class="download-row">
        <div class="file-icon">📋</div>
        <div class="file-info">
          <div class="file-name">Bill of Lading Template</div>
          <div class="file-desc">Standard BOL for cargo shipments</div>
        </div>
        <div class="file-meta">
          <span class="file-size">PDF</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

      <a href="files/carrier-packet.zip" download class="download-row">
        <div class="file-icon">📦</div>
        <div class="file-info">
          <div class="file-name">Carrier Packet</div>
          <div class="file-desc">Full carrier onboarding documents</div>
        </div>
        <div class="file-meta">
          <span class="file-size">ZIP</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

    </div>
  </main>
</div>
<script>
const LS_THEME = 'ursa-theme';
const LS_LANG = 'ursa-lang';
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(LS_THEME, theme);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
function applyLang(lang) {
  document.getElementById('langBtn').textContent = lang === 'en' ? 'RU' : 'EN';
  localStorage.setItem(LS_LANG, lang);
}
function toggleLang() {
  applyLang(localStorage.getItem(LS_LANG) === 'ru' ? 'en' : 'ru');
}
(function() {
  applyTheme(localStorage.getItem(LS_THEME) || 'dark');
  applyLang(localStorage.getItem(LS_LANG) || 'en');
})();
</script>
</body>
</html>
