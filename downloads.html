<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads · URSA Express</title>
<link rel="stylesheet" href="assets/css/downloads.css">
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1 class="page-title">Downloads</h1>
    <p class="page-subtitle">Templates and documents for dispatchers</p>
    <div class="controls">
      <a href="index.html" class="nav-btn" style="font-weight:600;">← Main</a>
      <button class="nav-btn" id="langBtn" onclick="toggleLang()">RU</button>
      <button class="nav-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <p class="section-label">Available Files</p>
    <div class="downloads-list">

      <!-- Example file rows – replace href with actual file paths -->
      <a href="files/rate-confirmation-template.pdf" download class="download-row">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">Rate Confirmation Template</div>
          <div class="file-desc">Standard RC form for dispatchers</div>
        </div>
        <div class="file-meta">
          <span class="file-size">PDF</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

      <a href="files/bol-template.pdf" download class="download-row">
        <div class="file-icon">📋</div>
        <div class="file-info">
          <div class="file-name">Bill of Lading Template</div>
          <div class="file-desc">Standard BOL for cargo shipments</div>
        </div>
        <div class="file-meta">
          <span class="file-size">PDF</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

      <a href="files/carrier-packet.zip" download class="download-row">
        <div class="file-icon">📦</div>
        <div class="file-info">
          <div class="file-name">Carrier Packet</div>
          <div class="file-desc">Full carrier onboarding documents</div>
        </div>
        <div class="file-meta">
          <span class="file-size">ZIP</span>
          <span class="download-btn">⬇ Download</span>
        </div>
      </a>

    </div>
  </main>
</div>
<script src="assets/js/downloads.js"></script>
</body>
</html>
