<style>
:root[data-theme="dark"] {

  --text-dimmer: #3f3f46;
  --text-empty: #252525;
  --accent: #FFB318;

  --rank-silver-bg: rgba(148,163,184,0.10);
  --rank-silver-fg: #8fa3b8;
  --rank-plain-bg: rgba(63,63,70,0.25);
  --rank-plain-fg: #52525b;
  --rank-none-bg: rgba(24,24,27,0.60);
  --rank-none-fg: #3f3f46;

  --c-charge-bg: rgba(34,197,94,0.07);
  --c-charge-fg: #86efac;
  --c-charge-br: rgba(34,197,94,0.14);
  --c-careful-bg: rgba(245,158,11,0.07);
  --c-careful-fg: #fcd34d;
  --c-careful-br: rgba(245,158,11,0.14);
  --c-recover-bg: rgba(59,130,246,0.07);
  --c-recover-fg: #93c5fd;
  --c-recover-br: rgba(59,130,246,0.14);
  --c-prospect-bg: rgba(139,92,246,0.07);
  --c-prospect-fg: #c4b5fd;

  --c-default-bg: rgba(24,24,27,0.80);
  --c-default-fg: #71717a;
  --c-default-br: #1e1e1e;

  --ok-bg: rgba(34,197,94,0.12);
  --ok-fg: #4ade80;
}

:root[data-theme="light"] {
  --bg: #eef0f5;
  --card: #f5f6f9;
  --card-2: #f1f5f9;
  --border: #d8dde8;
  --border-strong: #c1c8d6;
  --rep-divider: #f1f5f9;
  --text: #0f172a;
  --text-2: #1e293b;
  --text-muted: #475569;
  --text-dim: #64748b;
  --text-dimmer: #94a3b8;
  --text-empty: #cbd5e1;
  --accent: #c87f00;
  --accent-2: #e09e10;
  --accent-soft: rgba(255,179,24,0.10);
  --accent-strong: rgba(255,179,24,0.18);
  --section-rule: #e2e8f0;

  --rank-gold-bg: rgba(234,179,8,0.18);
  --rank-gold-fg: #a16207;
  --rank-silver-bg: rgba(100,116,139,0.15);
  --rank-silver-fg: #475569;
  --rank-plain-bg: rgba(148,163,184,0.18);
  --rank-plain-fg: #64748b;
  --rank-none-bg: #e2e8f0;
  --rank-none-fg: #94a3b8;

  --c-charge-bg: rgba(34,197,94,0.10);
  --c-charge-fg: #15803d;
  --c-charge-br: rgba(34,197,94,0.22);
  --c-careful-bg: rgba(245,158,11,0.10);
  --c-careful-fg: #b45309;
  --c-careful-br: rgba(245,158,11,0.22);
  --c-recover-bg: rgba(59,130,246,0.10);
  --c-recover-fg: #1d4ed8;
  --c-recover-br: rgba(59,130,246,0.22);
  --c-prospect-bg: rgba(139,92,246,0.10);
  --c-prospect-fg: #6d28d9;
  --c-prospect-br: rgba(139,92,246,0.22);
  --c-default-bg: #f1f5f9;
  --c-default-fg: #64748b;
  --c-default-br: #e2e8f0;

  --ok-bg: rgba(34,197,94,0.18);
  --ok-fg: #15803d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

.topbar { position: relative; text-align: center; margin-bottom: 28px; min-height: 48px; }
.brand-logo-link { position: absolute; top: 0; left: 0; display: inline-flex; transition: opacity 0.15s; text-decoration: none; }
.brand-logo-link:hover { opacity: 0.8; }
.brand-logo { height: 38px; width: auto; display: block; }
.controls { position: absolute; top: 0; left: 0; display: flex; gap: 8px; }
@media (max-width: 600px) {
  .topbar { padding-top: 56px; }
  .brand-logo-link { left: 50%; transform: translateX(-50%); }
  .controls { position: static; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
}
.page-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-top: 2px;
}
.page-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.nav-btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 12px; min-width: 36px;
  background: var(--card); background-image: linear-gradient(to right, var(--primary) 50%, transparent 50%); background-size: 200% 100%; background-position: 101% 0; background-repeat: no-repeat; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  text-decoration: none; cursor: pointer; transition: background-position 0.18s cubic-bezier(.4,0,1,1), border-color 0.16s ease, color 0.16s ease;
  font-family: inherit;
}
.nav-btn:hover { background-position: 0% 0; border-color: var(--primary); color: #1a1205; }
.nav-btn[href="index.html"] { background-image: linear-gradient(to left, var(--primary) 50%, transparent 50%); background-position: -1% 0; }
.nav-btn[href="index.html"]:hover { background-position: 101% 0; }
.nav-btn-icon { font-size: 15px; letter-spacing: 0; }
#theme-toggle svg { width: 18px; height: 18px; }
:root[data-theme="dark"] .icon-sun { display: block; }
:root[data-theme="dark"] .icon-moon { display: none; }
:root[data-theme="light"] .icon-sun { display: none; }
:root[data-theme="light"] .icon-moon { display: block; }

.search-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.search-box { flex: 1; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dimmer); pointer-events: none; width: 15px; height: 15px; }
#search {
  width: 100%; padding: 10px 12px 10px 36px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  outline: none; transition: background-position 0.18s cubic-bezier(.4,0,1,1), border-color 0.16s ease, color 0.16s ease; font-family: inherit;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text-dimmer); }
#count { font-size: 12px; color: var(--text-dim); white-space: nowrap; font-weight: 500; min-width: 52px; text-align: right; }

.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--text-dimmer); text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--section-rule); }

.subcat {
  grid-column: 1/-1;
  padding: 8px 12px; border-radius: 8px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-top: 10px;
  font-size: 11.5px;
  border: 1px solid transparent;
}
.grid-full + .subcat { margin-top: 0; }
.subcat .sc-name { font-weight: 700; letter-spacing: 0.02em; }
.subcat .sc-count { font-size: 10.5px; font-weight: 600; opacity: 0.7; }
.subcat .sc-desc { font-size: 11.5px; opacity: 0.85; }
.subcat.sc-recover  { background: var(--c-recover-bg);  color: var(--c-recover-fg);  border-color: var(--c-recover-br); }
.subcat.sc-prospect { background: var(--c-prospect-bg); color: var(--c-prospect-fg); border-color: var(--c-prospect-br); }
.subcat.sc-other    { background: var(--c-default-bg);  color: var(--c-default-fg);  border-color: var(--c-default-br); }

.broker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
@media (max-width: 480px) { .broker-grid { grid-template-columns: 1fr; } }
.grid-full { grid-column: 1 / -1; margin-top: 20px; }
.grid-full:first-child { margin-top: 0; }

.broker-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; transition: background-position 0.18s cubic-bezier(.4,0,1,1), border-color 0.16s ease, color 0.16s ease;
}
.broker-card:hover { border-color: var(--border-strong); }

.card-head { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px 10px; }
.rank {
  flex-shrink: 0; min-width: 28px; height: 26px; padding: 0 5px;
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.r-gold   { background: var(--rank-gold-bg);   color: var(--rank-gold-fg); }
.r-silver { background: var(--rank-silver-bg); color: var(--rank-silver-fg); }
.r-plain  { background: var(--rank-plain-bg);  color: var(--rank-plain-fg); }
.r-none   { background: var(--rank-none-bg);   color: var(--rank-none-fg); font-size: 14px; }

.card-name { font-size: 12.5px; font-weight: 600; line-height: 1.4; color: var(--text-2); flex: 1; word-break: break-word; }

.card-note { margin: 0 14px 10px; padding: 7px 10px; border-radius: 7px; font-size: 11.5px; line-height: 1.5; }
.n-charge  { background: var(--c-charge-bg);  color: var(--c-charge-fg);  border: 1px solid var(--c-charge-br); }
.n-careful { background: var(--c-careful-bg); color: var(--c-careful-fg); border: 1px solid var(--c-careful-br); }
.n-recover { background: var(--c-recover-bg); color: var(--c-recover-fg); border: 1px solid var(--c-recover-br); }
.n-prospect{ background: var(--c-prospect-bg);color: var(--c-prospect-fg);border: 1px solid var(--c-prospect-br); }
.n-default { background: var(--c-default-bg); color: var(--c-default-fg); border: 1px solid var(--c-default-br); }

.card-reps { padding: 0 14px 12px; }
.reps-head { font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-dimmer); text-transform: uppercase; margin-bottom: 5px; }
.rep-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid var(--rep-divider); }
.rep-row:first-of-type { border-top: none; }
.rep-nm { font-size: 11.5px; color: var(--text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rep-nm.empty { color: var(--text-empty); }
.rep-email {
  font-size: 11px; color: var(--accent); background: var(--accent-soft);
  border: none; border-radius: 5px; padding: 3px 8px;
  cursor: pointer; font-family: inherit; font-weight: 500;
  white-space: nowrap; max-width: 185px; overflow: hidden; text-overflow: ellipsis;
  transition: background 0.12s, color 0.12s; display: block;
}
.rep-email:hover { background: var(--accent-strong); }
.rep-email.ok { background: var(--ok-bg); color: var(--ok-fg); }

.empty { grid-column: 1/-1; text-align: center; padding: 56px 24px; color: var(--text-dimmer); font-size: 14px; }

/* Help modal */
.help-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 200; display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.help-overlay.open { display: flex; animation: helpFade 0.15s ease; }
.help-card {
  background: var(--card);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  max-width: 540px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  padding: 22px 24px 20px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
}
.help-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.help-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
.help-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 22px; line-height: 1;
  padding: 0 4px; margin-top: -2px; font-family: inherit;
}
.help-close:hover { color: var(--text); }
.help-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; margin: 8px 0 18px; }
.help-section {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
}
.help-steps { list-style: none; padding: 0; margin: 0; }
.help-steps li {
  display: flex; gap: 12px;
  padding: 10px 0;
  font-size: 13px; line-height: 1.55;
  color: var(--text-2);
  border-top: 1px solid var(--border);
}
.help-steps li:first-child { border-top: none; padding-top: 4px; }
.help-num {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--accent-soft); color: var(--accent);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; margin-top: 1px;
}
@keyframes helpFade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

const LS_THEME = 'brokers_theme';
const LS_LANG  = 'brokers_lang';
let lang = (localStorage.getItem(LS_LANG) === 'ru') ? 'ru' : 'en';

function t(k) { return I18N[lang][k] || k; }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function noteStyle(note) {
  if (!note) return null;
  const n = note.toLowerCase();
  if (n.includes('нужно вернуть')) return 'recover';
  if (n.includes('не отдают')) return 'prospect';
  if (n.includes('дороже')) return 'charge';
  if (n.includes('аккуратно') || n.includes('детеншн')) return 'careful';
  return 'default';
}

function watchCategory(note) {
  if (!note) return 'other';
  const n = note.toLowerCase();
  if (n.includes('нужно вернуть')) return 'recover';
  if (n.includes('не отдают')) return 'prospect';
  return 'other';
}

function card(b, hideNote) {
  let rk, rc;
  if (b.rank == null) { rk = '–'; rc = 'r-none'; }
  else if (b.rank <= 3) { rk = '#'+b.rank; rc = 'r-gold'; }
  else if (b.rank <= 10) { rk = '#'+b.rank; rc = 'r-silver'; }
  else { rk = '#'+b.rank; rc = 'r-plain'; }

  let noteHtml = '';
  if (!hideNote) {
    const ns = noteStyle(b.note);
    if (b.note && ns) noteHtml = `<div class="card-note n-${ns}">${esc(b.note)}</div>`;
  }

  let repsHtml = '';
  if (b.reps.length) {
    const rows = b.reps.map(r => {
      const nm = r.name
        ? `<span class="rep-nm">${esc(r.name)}</span>`
        : `<span class="rep-nm empty">–</span>`;
      const em = r.email
        ? `<button class="rep-email" onclick="cp(this,'${r.email.replace(/'/g,"\\'")}')">${esc(r.email)}</button>`
        : '';
      return `<div class="rep-row">${nm}${em}</div>`;
    }).join('');
    repsHtml = `<div class="card-reps"><div class="reps-head">${esc(t('repsHead'))}</div>${rows}</div>`;
  }

  return `<div class="broker-card"><div class="card-head"><div class="rank ${rc}">${rk}</div><div class="card-name">${esc(b.name)}</div></div>${noteHtml}${repsHtml}</div>`;
}

function render(q, opts) {
  q = (q||'').toLowerCase().trim();
  const all = DATA.filter(b => {
    if (!q) return true;
    if (b.name.toLowerCase().includes(q)) return true;
    if (b.note && b.note.toLowerCase().includes(q)) return true;
    return b.reps.some(r =>
      (r.name && r.name.toLowerCase().includes(q)) ||
      (r.email && r.email.toLowerCase().includes(q))
    );
  });

  const ranked = all.filter(b => b.rank != null);
  const watch  = all.filter(b => b.rank == null);
  const watchGroups = { recover: [], prospect: [], other: [] };
  watch.forEach(b => watchGroups[watchCategory(b.note)].push(b));

  const list = document.getElementById('list');
  document.getElementById('count').textContent = all.length + ' / ' + DATA.length;

  if (!all.length) {
    list.innerHTML = `<div class="empty">${esc(t('empty'))}</div>`;
    return;
  }

  let html = '';
  if (ranked.length) {
    html += `<div class="grid-full"><div class="section-label">${esc(t('sectionRanked'))}</div></div>`;
    ranked.forEach(b => { html += card(b, false); });
  }
  if (watch.length) {
    html += `<div class="grid-full"><div class="section-label">${esc(t('sectionWatch'))}</div></div>`;
    const order = ['recover','prospect','other'];
    order.forEach(cat => {
      const items = watchGroups[cat];
      if (!items.length) return;
      if (cat === 'recover') {
        html += `<div class="subcat sc-recover"><span class="sc-name">${esc(t('catRecover'))}</span><span class="sc-count">${items.length}</span><span class="sc-desc">– ${esc(t('catRecoverDesc'))}</span></div>`;
      } else if (cat === 'prospect') {
        html += `<div class="subcat sc-prospect"><span class="sc-name">${esc(t('catProspect'))}</span><span class="sc-count">${items.length}</span><span class="sc-desc">– ${esc(t('catProspectDesc'))}</span></div>`;
      } else {
        html += `<div class="subcat sc-other"><span class="sc-name">${esc(t('catOther'))}</span><span class="sc-count">${items.length}</span></div>`;
      }
      const hideNote = (cat === 'recover' || cat === 'prospect');
      items.forEach(b => { html += card(b, hideNote); });
    });
  }
  list.innerHTML = html;

  if (opts && opts.scroll) {
    const wrap = document.querySelector('.search-wrap');
    if (wrap) {
      const top = wrap.getBoundingClientRect().top + window.scrollY - 16;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  }
}

function cp(btn, email) {
  const orig = btn.textContent;
  const okText = t('copied');
  const reset = () => {
    btn.textContent = orig;
    btn.classList.remove('ok');
  };
  const ok = () => {
    btn.textContent = okText;
    btn.classList.add('ok');
    setTimeout(reset, 1400);
  };
  navigator.clipboard.writeText(email).then(ok).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = email; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); ok(); } catch(e) {}
    document.body.removeChild(ta);
  });
}

function applyLang() {
  document.documentElement.setAttribute('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.getElementById('lang-toggle').textContent = (lang === 'en') ? 'RU' : 'EN';
  render(document.getElementById('search').value);
}

function openHelp() { document.getElementById('help-overlay').classList.add('open'); }
function closeHelp() { document.getElementById('help-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeHelp(); });

function toggleLang() {
  lang = (lang === 'en') ? 'ru' : 'en';
  try { localStorage.setItem(LS_LANG, lang); } catch(e) {}
  applyLang();
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem(LS_THEME, theme); } catch(e) {}
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

(function init() {
  const savedTheme = localStorage.getItem(LS_THEME) || 'dark';
  applyTheme(savedTheme);
  applyLang();
  document.getElementById('search').addEventListener('input', e => render(e.target.value, { scroll: true }));
})();
// Функция, которая проверяет пароль
function checkPass() {
  const pass = document.getElementById('pass-input').value;
  const secret = "JIMMY"; // Твой пароль

  if (pass === secret) {
    // Если пароль верный: скрываем заставку и показываем сайт
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    // Запоминаем, что вход выполнен (чтобы не вводить при обновлении страницы)
    localStorage.setItem('isAuthorized', 'true');
  } else {
    // Если неверный: показываем текст ошибки
    document.getElementById('error-msg').style.display = 'block';
  }
}

// Позволяет нажимать Enter вместо клика по кнопке
document.getElementById('pass-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') checkPass();
});

// Дополнение к стандартной загрузке (init)
(function authInit() {
  // Проверяем, входил ли пользователь ранее
  if (localStorage.getItem('isAuthorized') === 'true') {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  }
})();
