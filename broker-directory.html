<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broker Directory · URSA Express</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #000; color: #fff; min-height: 100vh; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

.topbar { position: relative; text-align: center; margin-bottom: 28px; min-height: 48px; }
.brand-logo-link { position: absolute; top: 0; left: 0; display: inline-flex; transition: opacity 0.15s; text-decoration: none; }
.brand-logo-link:hover { opacity: 0.8; }
.brand-logo { height: 38px; width: auto; display: block; }
.controls { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
@media (max-width: 600px) {
  .topbar { padding-top: 56px; }
  .brand-logo-link { left: 50%; transform: translateX(-50%); }
  .controls {
    position: static;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
}
.page-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
  background: linear-gradient(90deg, #5b6ef5, #4ea1ff);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-top: 2px;
}
.page-sub { font-size: 12px; color: #52525b; margin-top: 4px; }

.nav-btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 12px;
  background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 8px;
  color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  text-decoration: none; transition: border-color 0.15s;
}
.nav-btn:hover { border-color: #2a2a2a; }

.search-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.search-box { flex: 1; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #3f3f46; pointer-events: none; width: 15px; height: 15px; }
#search {
  width: 100%; padding: 10px 12px 10px 36px;
  background: #0d0d0d; border: 1px solid #1f1f1f;
  border-radius: 10px; color: #fff; font-size: 14px;
  outline: none; transition: border-color 0.15s; font-family: inherit;
}
#search:focus { border-color: #5b6ef5; }
#search::placeholder { color: #3f3f46; }
#count { font-size: 12px; color: #52525b; white-space: nowrap; font-weight: 500; min-width: 52px; text-align: right; }

.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: #3f3f46; text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #141414; }

.broker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
@media (max-width: 480px) { .broker-grid { grid-template-columns: 1fr; } }
.grid-full { grid-column: 1 / -1; margin-top: 20px; }
.grid-full:first-child { margin-top: 0; }

.broker-card {
  background: #0a0a0a; border: 1px solid #1a1a1a;
  border-radius: 12px; overflow: hidden; transition: border-color 0.15s;
}
.broker-card:hover { border-color: #2a2a2a; }

.card-head { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px 10px; }
.rank {
  flex-shrink: 0; min-width: 28px; height: 26px; padding: 0 5px;
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.r-gold   { background: rgba(250,189,0,0.12);  color: #fabe00; }
.r-silver { background: rgba(148,163,184,0.10); color: #8fa3b8; }
.r-plain  { background: rgba(63,63,70,0.25);   color: #52525b; }
.r-none   { background: rgba(24,24,27,0.60);   color: #3f3f46; font-size: 14px; }

.card-name { font-size: 12.5px; font-weight: 600; line-height: 1.4; color: #e4e4e7; flex: 1; word-break: break-word; }

.card-note { margin: 0 14px 10px; padding: 7px 10px; border-radius: 7px; font-size: 11.5px; line-height: 1.5; }
.n-charge  { background: rgba(34,197,94,0.07);  color: #86efac; border: 1px solid rgba(34,197,94,0.14); }
.n-careful { background: rgba(245,158,11,0.07); color: #fcd34d; border: 1px solid rgba(245,158,11,0.14); }
.n-recover { background: rgba(59,130,246,0.07); color: #93c5fd; border: 1px solid rgba(59,130,246,0.14); }
.n-prospect{ background: rgba(139,92,246,0.07); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.14); }
.n-info    { background: rgba(99,102,241,0.07); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.14); }
.n-default { background: rgba(24,24,27,0.80);   color: #71717a; border: 1px solid #1e1e1e; }

.card-reps { padding: 0 14px 12px; }
.reps-head { font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em; color: #3f3f46; text-transform: uppercase; margin-bottom: 5px; }
.rep-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid #111; }
.rep-row:first-of-type { border-top: none; }
.rep-nm { font-size: 11.5px; color: #71717a; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rep-email {
  font-size: 11px; color: #5b6ef5; background: rgba(91,110,245,0.10);
  border: none; border-radius: 5px; padding: 3px 8px;
  cursor: pointer; font-family: inherit; font-weight: 500;
  white-space: nowrap; max-width: 185px; overflow: hidden; text-overflow: ellipsis;
  transition: background 0.12s, color 0.12s; display: block;
}
.rep-email:hover { background: rgba(91,110,245,0.18); }
.rep-email.ok { background: rgba(34,197,94,0.12); color: #4ade80; }

.empty { grid-column: 1/-1; text-align: center; padding: 56px 24px; color: #3f3f46; font-size: 14px; }
</style>
</head>

function noteStyle(note) {
  if (!note) return null;
  const n = note.toLowerCase();
  if (n.includes('нужно вернуть')) return 'recover';
  if (n.includes('не отдают')) return 'prospect';
  if (n.includes('дороже')) return 'charge';
  if (n.includes('аккуратно') || n.includes('детеншн')) return 'careful';
  return 'default';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function card(b) {
  let rk, rc;
  if (b.rank == null) { rk = '—'; rc = 'r-none'; }
  else if (b.rank <= 3) { rk = '#'+b.rank; rc = 'r-gold'; }
  else if (b.rank <= 10) { rk = '#'+b.rank; rc = 'r-silver'; }
  else { rk = '#'+b.rank; rc = 'r-plain'; }

  let noteHtml = '';
  const ns = noteStyle(b.note);
  if (b.note && ns) {
    noteHtml = `<div class="card-note n-${ns}">${esc(b.note)}</div>`;
  }

  let repsHtml = '';
  if (b.reps.length) {
    const rows = b.reps.map(r => {
      const nm = r.name
        ? `<span class="rep-nm">${esc(r.name)}</span>`
        : `<span class="rep-nm" style="color:#252525">—</span>`;
      const em = r.email
        ? `<button class="rep-email" onclick="cp(this,'${r.email.replace(/'/g,"\\'")}')">${esc(r.email)}</button>`
        : '';
      return `<div class="rep-row">${nm}${em}</div>`;
    }).join('');
    repsHtml = `<div class="card-reps"><div class="reps-head">Reps &amp; Contacts</div>${rows}</div>`;
  }

  return `<div class="broker-card"><div class="card-head"><div class="rank ${rc}">${rk}</div><div class="card-name">${esc(b.name)}</div></div>${noteHtml}${repsHtml}</div>`;
}

function render(q) {
  q = (q||'').toLowerCase().trim();
  const all = DATA.filter(b => {
    if (!q) return true;
    if (b.name.toLowerCase().includes(q)) return true;
    if (b.note && b.note.toLowerCase().includes(q)) return true;
    return b.reps.some(r =>
      (r.name && r.name.toLowerCase().includes(q)) ||
      (r.email && r.email.toLowerCase().includes(q))
    );
  });

  const ranked = all.filter(b => b.rank != null);
  const watch  = all.filter(b => b.rank == null);
  const list   = document.getElementById('list');

  document.getElementById('count').textContent = all.length + ' / ' + DATA.length;

  if (!all.length) {
    list.innerHTML = '<div class="empty">Nothing found</div>';
    return;
  }

  let html = '';
  if (ranked.length) {
    html += '<div class="grid-full"><div class="section-label">Ranked Brokers</div></div>';
    ranked.forEach(b => { html += card(b); });
  }
  if (watch.length) {
    html += '<div class="grid-full"><div class="section-label">Watch List</div></div>';
    watch.forEach(b => { html += card(b); });
  }
  list.innerHTML = html;
}

function cp(btn, email) {
  navigator.clipboard.writeText(email).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 1400);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = email; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  });
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render('');
