<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Duty · URSA Express</title>
<style>
:root[data-theme="dark"] {
  --bg: #000000;
  --card: #0a0a0a;
  --card-2: #111111;
  --border: #1f1f1f;
  --border-strong: #2a2a2a;
  --text: #ffffff;
  --text-muted: #71717a;
  --text-dim: #52525b;
  --accent: #5b6ef5;
  --accent-hover: #6f80ff;
  --accent-soft: rgba(91,110,245,0.12);
  --success: #22c55e;
  --success-soft: rgba(34,197,94,0.12);
  --shadow: 0 0 0 1px rgba(255,255,255,0.04);
}
:root[data-theme="light"] {
  --bg: #ffffff;
  --card: #fafafa;
  --card-2: #f4f4f5;
  --border: #e5e7eb;
  --border-strong: #d4d4d8;
  --text: #0a0a0a;
  --text-muted: #6b7280;
  --text-dim: #a1a1aa;
  --accent: #5b6ef5;
  --accent-hover: #4f5ee0;
  --accent-soft: rgba(91,110,245,0.10);
  --success: #16a34a;
  --success-soft: rgba(22,163,74,0.10);
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Header */
.topbar {
  position: relative;
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}
.brand-logo-link {
  position: absolute;
  top: 0; left: 0;
  display: inline-flex;
  transition: opacity 0.15s;
  text-decoration: none;
}
.brand-logo-link:hover { opacity: 0.8; }
.brand-logo { height: 38px; width: auto; display: block; }
@media (max-width: 600px) {
  .topbar { padding-top: 60px; }
  .brand-logo-link { left: 50%; transform: translateX(-50%); }
}
.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(90deg, #5b6ef5, #4ea1ff);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-top: 4px;
}
.page-subtitle {
  margin-top: 6px;
  color: var(--text-muted);
  font-size: 0.9rem;
}
.controls { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
.nav-btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 12px; min-width: 36px;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  text-decoration: none; cursor: pointer; transition: border-color 0.15s, background 0.2s;
  font-family: inherit;
}
.nav-btn:hover { border-color: var(--border-strong); }

/* Result display */
.result-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 24px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: border-color 0.3s;
}
.result-box.winner {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(91,110,245,0.15);
}
.result-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.result-name {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  min-height: 48px;
  display: flex;
  align-items: center;
}
.result-name.rolling {
  animation: roll 0.08s infinite;
}
@keyframes roll {
  0% { opacity: 1; }
  50% { opacity: 0.4; }
  100% { opacity: 1; }
}
.result-placeholder {
  font-size: 1rem;
  color: var(--text-dim);
}

/* Spin button */
.spin-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
  margin-bottom: 24px;
}
.spin-btn:hover { background: var(--accent-hover); }
.spin-btn:active { transform: scale(0.98); }
.spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Controls row */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.select-all-btn {
  font-size: 0.78rem;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  transition: opacity 0.15s;
}
.select-all-btn:hover { opacity: 0.7; }
.count-badge {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-left: 8px;
}

/* Names list */
.names-list {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: pointer;
  user-select: none;
}
.name-row:last-child { border-bottom: none; }
.name-row:hover { background: var(--card-2); }
.name-row.excluded { opacity: 0.38; }
.name-text {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
}
.name-row.winner-highlight .name-text {
  color: var(--accent);
}

/* Custom checkbox */
.cb-wrap {
  position: relative;
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.cb-wrap input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
}
.cb-custom {
  display: block;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border-strong);
  background: var(--card-2);
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.cb-wrap input:checked + .cb-custom {
  background: var(--accent);
  border-color: var(--accent);
}
.cb-wrap input:checked + .cb-custom::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 6px; height: 10px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(40deg);
}

@media (max-width: 600px) {
  .topbar { padding-top: 60px; }
  .brand-logo-link { left: 50%; transform: translateX(-50%); }
  .controls { position: static; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
}
</style>
</head>

  <header class="topbar">

    <h1 class="page-title">Night Duty</h1>
    <p class="page-subtitle">Random pick for night shift</p>
    <div class="controls">
      <a href="index.html" class="nav-btn" style="font-weight:600;">← Main</a>
      <button class="nav-btn" id="langBtn" onclick="toggleLang()">RU</button>
      <button class="nav-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    </div>
  </header>

  <div class="result-box" id="result-box">
    <div class="result-label">On duty tonight</div>
    <div class="result-name" id="result-name">
      <span class="result-placeholder">Press Spin to pick</span>
    </div>
  </div>

  <button class="spin-btn" id="spin-btn" onclick="spin()">🎲 Spin</button>

  <div class="controls-row">
    <span class="section-label">Participants <span class="count-badge" id="count-badge"></span></span>
    <button class="select-all-btn" id="toggle-all-btn" onclick="toggleAll()">Deselect all</button>
  </div>

  <div class="names-list" id="names-list"></div>
</div>

<script>
const NAMES = [
  'Evgeny V.', 'Pavel Z.', 'Leon M.', 'Alex M.', 'Kent B.',
  'Andrew A.', 'Mike W.', 'Nate W.', 'Blake W.', 'Nick F.',
  'Jim S.', 'Tim S.', 'Michael K.', 'Jonas M.'
];

let checked = new Array(NAMES.length).fill(true);
let spinning = false;
let lastWinner = -1;

function render() {
  const list = document.getElementById('names-list');
  list.innerHTML = '';
  NAMES.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'name-row' + (checked[i] ? '' : ' excluded') + (lastWinner === i ? ' winner-highlight' : '');
    row.onclick = () => toggle(i);
    row.innerHTML = `
      <span class="name-text">${name}</span>
      <label class="cb-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${checked[i] ? 'checked' : ''} onchange="toggle(${i})">
        <span class="cb-custom"></span>
      </label>`;
    list.appendChild(row);
  });
  const active = checked.filter(Boolean).length;
  document.getElementById('count-badge').textContent = `(${active}/${NAMES.length})`;
  document.getElementById('toggle-all-btn').textContent = active === NAMES.length ? 'Deselect all' : 'Select all';
}

function toggle(i) {
  checked[i] = !checked[i];
  render();
}

function toggleAll() {
  const active = checked.filter(Boolean).length;
  checked = new Array(NAMES.length).fill(active < NAMES.length);
  render();
}

function spin() {
  const pool = NAMES.map((_, i) => i).filter(i => checked[i]);
  if (pool.length === 0) {
    const label = document.querySelector('.result-label');
    const orig = label.textContent;
    label.style.color = '#ef4444';
    label.textContent = 'Select at least one participant';
    setTimeout(() => { label.style.color = ''; label.textContent = orig; }, 2000);
    return;
  }
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spin-btn');
  const nameEl = document.getElementById('result-name');
  const box = document.getElementById('result-box');

  btn.disabled = true;
  box.classList.remove('winner');
  lastWinner = -1;
  render();
  nameEl.classList.add('rolling');

  let ticks = 0;
  const totalTicks = 24 + Math.floor(Math.random() * 12);
  let interval = 60;
  let lastPick = -1;

  function tick() {
    lastPick = pool[Math.floor(Math.random() * pool.length)];
    nameEl.textContent = NAMES[lastPick];
    ticks++;
    if (ticks >= totalTicks) {
      nameEl.classList.remove('rolling');
      box.classList.add('winner');
      lastWinner = lastPick;
      spinning = false;
      btn.disabled = false;
      btn.textContent = '🎲 Spin again';
      render();
      return;
    }
    interval = Math.min(interval * 1.06, 320);
    setTimeout(tick, interval);
  }
  tick();
}

const LS_THEME = 'ursa-theme';
const LS_LANG = 'ursa-lang';
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem(LS_THEME, theme);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
function applyLang(lang) {
  document.getElementById('langBtn').textContent = lang === 'en' ? 'RU' : 'EN';
  localStorage.setItem(LS_LANG, lang);
}
function toggleLang() {
  applyLang(localStorage.getItem(LS_LANG) === 'ru' ? 'en' : 'ru');
}

applyTheme(localStorage.getItem(LS_THEME) || 'dark');
applyLang(localStorage.getItem(LS_LANG) || 'en');
render();
