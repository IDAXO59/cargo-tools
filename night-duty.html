<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Duty · URSA Express</title>

  <link rel="stylesheet" href="assets/css/night-duty.css">

</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1 class="page-title">Night Duty</h1>
    <p class="page-subtitle">Random pick for night shift</p>
    <div class="controls">
      <a href="index.html" class="nav-btn">← Main</a>
      <button class="nav-btn" id="langBtn" onclick="toggleLang()">RU</button>
      <button class="nav-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="result-box" id="result-box">
    <div class="result-label">On duty tonight</div>
    <div class="result-name" id="result-name">
      <span class="result-placeholder">Press Spin to pick</span>
    </div>
  </div>

  <button class="spin-btn" id="spin-btn" onclick="spin()">🎲 Spin</button>

  <div class="controls-row">
    <span class="section-label">Participants <span class="count-badge" id="count-badge"></span></span>
    <button class="select-all-btn" id="toggle-all-btn" onclick="toggleAll()">Deselect all</button>
  </div>

  <div class="names-list" id="names-list"></div>
</div>

<script src="assets/js/shared.js"></script>
<script src="assets/js/night-duty.js"></script>
</body>
</html>
